name: Sentiment Engine

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"   # запуск каждые 5 минут
  workflow_dispatch:         # возможность запускать вручную

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install packages
      run: |
        pip install pandas requests yfinance

    - name: Ensure CSV exists
      run: |
        python - <<EOF
import os
if not os.path.exists("sentiment.csv"):
    with open("sentiment.csv","w") as f:
        f.write("time,sentiment\n")
EOF

    - name: Run sentiment script
      run: python sentiment_engine.py

    - name: Commit CSV
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"
        git add sentiment.csv
        git commit -m "update sentiment" || echo "No changes to commit"
        git push
